<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTD Note System</title>
  <link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">GTD Notes</span>
        </div>
        <span class="current-week-badge">Week <span id="currentWeekNum"></span> · <span id="currentYear"></span></span>
      </div>
      <div class="header-center">
        <span class="current-date" id="currentDate"></span>
      </div>
      <div class="header-right">
        <div id="authWrap" class="auth-wrap"></div>
        <button class="btn-secondary" id="exportAllBtn">Export All</button>
        <button class="btn-primary" id="quickAddBtn">+ Add Task</button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">

      <!-- Left Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">GTD VIEWS</div>
          <nav class="sidebar-nav">
            <button class="nav-item" data-view="today">
              <span class="nav-icon">🎯</span>
              <span class="nav-label">Today's Focus</span>
            </button>
            <button class="nav-item active" data-view="inbox">
              <span class="nav-icon">⬇</span>
              <span class="nav-label">Inbox</span>
              <span class="nav-badge" id="inboxCount"></span>
            </button>

            <!-- Time Specified Tasks (TST) -->
            <div id="tstSection"></div>

            <button class="nav-item" data-view="next">
              <span class="nav-icon">⚡</span>
              <span class="nav-label">Next Actions</span>
              <span class="nav-badge" id="nextCount"></span>
            </button>
            <button class="nav-item" data-view="waiting">
              <span class="nav-icon">⏳</span>
              <span class="nav-label">Waiting For</span>
              <span class="nav-badge" id="waitingCount"></span>
            </button>
            <button class="nav-item" data-view="someday">
              <span class="nav-icon">💭</span>
              <span class="nav-label">Someday / Maybe</span>
            </button>
            <button class="nav-item" data-view="done">
              <span class="nav-icon">✓</span>
              <span class="nav-label">Completed</span>
            </button>
            <button class="nav-item" data-view="board">
              <span class="nav-icon">⬡</span>
              <span class="nav-label">Visual Board</span>
            </button>
            <button class="nav-item" data-view="archive">
              <span class="nav-icon">🗄</span>
              <span class="nav-label">Archive</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label-row">
            <div class="sidebar-label">PROJECTS</div>
            <button class="sidebar-add-btn" id="addProjectBtn">+</button>
          </div>
          <div id="projectsList" class="projects-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">WEEK TRACKER</div>
          <div id="weekTracker" class="week-tracker"></div>
        </div>
      </aside>

      <!-- Week Detail Panel -->
      <aside class="week-panel">
        <div class="week-panel-header">
          <div>
            <div class="week-panel-title" id="weekPanelTitle">Week —</div>
            <div class="week-panel-dates" id="weekPanelDates">Select a week</div>
          </div>
          <button class="btn-generate" id="generateNoteBtn">📝 Obsidian</button>
        </div>

        <!-- Day View (clicking a specific day) -->
        <div id="dayView" class="hidden"></div>

        <!-- Today's Focus View -->
        <div id="todayView" class="hidden"></div>

        <!-- Inbox Review View -->
        <div id="inboxView" class="hidden">
          <div class="inbox-summary" id="inboxSummary"></div>
          <div class="inbox-list" id="inboxList"></div>
        </div>

        <!-- Project View -->
        <div id="projectView" class="hidden"></div>

        <!-- Visual Board View -->
        <div id="boardView" class="hidden"></div>

        <!-- Archive View -->
        <div id="archiveView" class="hidden"></div>

        <!-- Week View -->
        <div id="weekView">
          <div class="week-notes-section">
            <div class="week-notes-header">
              <span>Week Notes</span>
              <button class="save-notes-btn" id="saveNotesBtn">Save</button>
            </div>
            <textarea class="week-notes-textarea" id="weekNotesTextarea"
              placeholder="Reflections, blockers, learnings…"></textarea>
          </div>

          <div class="week-view-toolbar">
            <div class="tab-bar" id="weekTabBar">
              <button class="tab active" data-tab="all">All</button>
              <button class="tab personal" data-tab="personal">Personal</button>
              <button class="tab work" data-tab="work">Work</button>
            </div>
            <div class="proj-view-toggle">
              <button class="proj-toggle-btn active" id="weekListBtn">List</button>
              <button class="proj-toggle-btn" id="weekKanbanBtn">Kanban</button>
              <button class="proj-toggle-btn" id="weekGanttBtn">Gantt</button>
            </div>
          </div>

          <div id="weekListView" class="week-tasks-container">
            <div class="empty-state">Select a week from the calendar</div>
          </div>

          <div id="weekKanbanView" class="hidden"></div>
          <div id="weekGanttView" class="hidden"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Add / Edit Task Modal -->
  <div class="modal-overlay hidden" id="taskModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="taskModalTitle">Add Task</h3>
        <button class="modal-close-btn" id="taskModalClose">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editTaskId">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" id="fTaskTitle" class="form-input" placeholder="What needs to be done?">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Task ID</label>
            <input type="text" id="fTaskId" class="form-input task-id-input" readonly placeholder="Auto-generated">
          </div>
          <div class="form-group">
            <label class="form-label">Effort</label>
            <select id="fTaskEffort" class="form-select">
              <option value="TBD">TBD</option>
              <option value="10min">10 min</option>
              <option value="20min">20 min</option>
              <option value="60min">60 min</option>
              <option value="90min">90 min</option>
              <option value="120min">120 min</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Progress</label>
            <select id="fTaskProgress" class="form-select">
              <option value="0">0%</option>
              <option value="10">10%</option>
              <option value="25">25%</option>
              <option value="50">50%</option>
              <option value="75">75%</option>
              <option value="90">90%</option>
              <option value="100">100% — Done</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Remain Effort</label>
            <input type="text" id="fTaskRemain" class="form-input task-id-input" readonly placeholder="Auto-calculated">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="fTaskCategory" class="form-select">
              <option value="personal">Personal</option>
              <option value="work">Work</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select id="fTaskPriority" class="form-select">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">GTD Status</label>
            <select id="fTaskStatus" class="form-select">
              <option value="inbox">Inbox</option>
              <option value="next">Next Action</option>
              <option value="waiting">Waiting For</option>
              <option value="someday">Someday</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="fTaskExecStatus" class="form-select">
              <option value="">— No status —</option>
              <option value="todo">Todo</option>
              <option value="wip">WIP</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Project</label>
            <select id="fTaskProject" class="form-select">
              <option value="">No Project</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Week #</label>
            <input type="number" id="fTaskWeek" class="form-input" min="1" max="53" placeholder="e.g. 17">
          </div>
          <div class="form-group">
            <label class="form-label">Year</label>
            <input type="number" id="fTaskYear" class="form-input" placeholder="e.g. 2026">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Specific Day <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
          <input type="date" id="fTaskDay" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Delegated To <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
          <input type="text" id="fTaskDelegated" class="form-input" placeholder="Name or team…">
        </div>
        <div class="form-group">
          <label class="form-label">Context</label>
          <input type="text" id="fTaskContext" class="form-input" placeholder="@home, @office, @computer…">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="fTaskNotes" class="form-textarea" placeholder="Details, links, references…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-archive hidden" id="deleteTaskBtn">Archive</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="taskModalCancel">Cancel</button>
          <button class="btn-primary" id="taskModalSave">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Project Modal -->
  <div class="modal-overlay hidden" id="projectModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="projectModalTitle">New Project</h3>
        <button class="modal-close-btn" id="projectModalClose">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProjectId">
        <div class="form-group">
          <label class="form-label">Project Name *</label>
          <input type="text" id="fProjectName" class="form-input" placeholder="Project name">
        </div>
        <div class="form-group">
          <label class="form-label">Parent Project <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
          <select id="fProjectParent" class="form-select">
            <option value="">— None (top-level) —</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select id="fProjectType" class="form-select">
              <option value="personal">Personal</option>
              <option value="work">Work</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="fProjectStatus" class="form-select">
              <option value="active">Active</option>
              <option value="on-hold">On Hold</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="fProjectDesc" class="form-textarea" placeholder="What is this project about?"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-archive hidden" id="deleteProjectBtn">Archive</button>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="projectModalCancel">Cancel</button>
          <button class="btn-primary" id="projectModalSave">Save Project</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Obsidian Export Modal -->
  <div class="modal-overlay hidden" id="obsidianModalOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Export to Obsidian</h3>
        <button class="modal-close-btn" id="obsidianModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Filename</label>
          <input type="text" id="obsidianFilename" class="form-input">
        </div>
        <pre class="note-preview" id="notePreview"></pre>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn-secondary" id="obsidianModalCancel">Cancel</button>
          <button class="btn-secondary" id="copyNoteBtn">Copy</button>
          <button class="btn-primary" id="downloadNoteBtn">Download .md</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Focus Mode Overlay -->
  <div id="focusModeOverlay" class="hidden"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
